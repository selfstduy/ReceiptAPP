name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04

    steps:
      - name: 签出代码
        uses: actions/checkout@v4

      - name: 配置 Java 17（Android SDK cmdline-tools 需要）
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip wget \
            build-essential \
            autoconf automake libtool \
            pkg-config \
            zlib1g-dev libncurses-dev \
            libffi-dev libssl-dev \
            libltdl-dev \
            cmake \
            python3-pip python3-venv python3-setuptools

      - name: 缓存 buildozer 全局目录
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: 安装 Android SDK cmdline-tools 并接受许可证
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_DIR/cmdline-tools"

          # 下载 Android cmdline-tools
          wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" \
            -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp/
          mv /tmp/cmdline-tools "$SDK_DIR/cmdline-tools/latest"

          # 创建 buildozer 所需的旧版兼容路径 tools/bin/sdkmanager
          mkdir -p "$SDK_DIR/tools/bin"
          ln -sf "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" "$SDK_DIR/tools/bin/sdkmanager"
          ln -sf "$SDK_DIR/cmdline-tools/latest/bin/avdmanager"  "$SDK_DIR/tools/bin/avdmanager"

          export ANDROID_SDK_ROOT="$SDK_DIR"
          SDKMANAGER="$SDK_DIR/cmdline-tools/latest/bin/sdkmanager"

          # 接受所有 SDK 许可证（含预览版）
          yes | "$SDKMANAGER" --licenses || true

          # 安装必要 SDK 组件（稳定版 build-tools）
          "$SDKMANAGER" \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2"

      - name: 安装 Python 构建工具
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install setuptools cython==0.29.36 buildozer
          buildozer --version

      - name: 构建 APK（debug）
        run: |
          buildozer -v android debug 2>&1

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: receiptapp-debug-apk
          path: bin/*.apk
          retention-days: 7
