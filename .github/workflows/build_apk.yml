name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # 支持在 GitHub 网页手动触发

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04   # 纯 Linux，无 WSL 兼容问题

    steps:
      - name: 签出代码
        uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses-dev \
            libffi-dev libssl-dev cmake \
            python3-pip python3-venv

      - name: 缓存 buildozer 全局目录（SDK/NDK 等，加速后续构建）
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: 安装 Python 构建工具
        run: |
          python3 -m pip install --upgrade pip
          pip install setuptools cython buildozer

      - name: 构建 APK（debug）
        run: |
          # 使用纯净 Linux PATH，确保 NDK 工具链正确
          export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          buildozer -v android debug

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: receiptapp-debug-apk
          path: bin/*.apk
          retention-days: 7   # 保留 7 天，可按需修改
